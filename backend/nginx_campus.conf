# /etc/nginx/sites-available/campus_resource_platform
# Symlink to /etc/nginx/sites-enabled/ then run: nginx -t && systemctl reload nginx
#
# This config terminates HTTPS (handled by your existing certbot/letsencrypt
# setup, or you can add a separate server block for that).
# Adjust the server_name to a domain or use _ for catch-all.

server {
    listen 80 default_server;
    server_name _;   # change to your domain if you have one

    # If you set up Let's Encrypt later, uncomment redirect:
    # return 301 https://$host$request_uri;

    client_max_body_size 60M;   # allow 50MB uploads + headroom

    # Static prototype HTML
    location / {
        root /opt/campus_resource_platform/web;
        index Prototype.html;
        try_files $uri $uri/ /Prototype.html;
    }

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long enough for file uploads
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # API docs
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
