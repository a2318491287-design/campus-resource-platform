version: "3.8"

# ============================================================
# Campus Resource Platform — Docker Compose
# Tuned for a 1GB RAM VPS that already runs other services
# Memory budget: ~210MB total (180MB DB + 30MB API)
# ============================================================

services:

  db:
    image: mariadb:10.11
    container_name: campus_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_pwd_change_me}
      MARIADB_DATABASE: campus_resource_platform
      MARIADB_USER: campus
      MARIADB_PASSWORD: ${DB_USER_PASSWORD:-campus_pwd}
      MARIADB_AUTO_UPGRADE: "true"
    command: >
      --innodb-buffer-pool-size=64M
      --innodb-log-buffer-size=4M
      --innodb-log-file-size=16M
      --key-buffer-size=8M
      --max-connections=80
      --table-open-cache=128
      --thread-cache-size=8
      --tmp-table-size=8M
      --max-heap-table-size=8M
      --performance-schema=OFF
      --skip-name-resolve
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - campus_net
    deploy:
      resources:
        limits:
          memory: 180M
    # In docker-compose v2, use mem_limit (works without 'deploy')
    mem_limit: 180m
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: campus_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql+pymysql://campus:${DB_USER_PASSWORD:-campus_pwd}@db:3306/campus_resource_platform?charset=utf8mb4"
      SECRET_KEY: ${SECRET_KEY:-please-change-this-in-production}
      STORAGE_DIR: /app/storage
      CORS_ORIGINS: '["*"]'
    volumes:
      - ./storage:/app/storage
    ports:
      - "127.0.0.1:8000:8000"   # Only listen on localhost; nginx will proxy
    networks:
      - campus_net
    deploy:
      resources:
        limits:
          memory: 160M
    mem_limit: 160m

volumes:
  db_data:

networks:
  campus_net:
